<svg width="200" height="48" viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Stacked page layers -->
  <rect x="8" y="6" width="36" height="42" rx="4" fill="#9FE1CB" opacity="0.4"/>
  <rect x="4" y="3" width="36" height="42" rx="4" fill="#5DCAA5" opacity="0.5"/>
  <rect x="0" y="0" width="36" height="42" rx="4" fill="#1D9E75"/>
  <!-- Ledger lines -->
  <line x1="6" y1="11" x2="30" y2="11" stroke="white" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
  <line x1="6" y1="18" x2="30" y2="18" stroke="white" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
  <!-- Bar chart -->
  <rect x="6"  y="32" width="5" height="8"  rx="1.5" fill="white" opacity="0.5"/>
  <rect x="14" y="27" width="5" height="13" rx="1.5" fill="white" opacity="0.7"/>
  <rect x="22" y="22" width="5" height="18" rx="1.5" fill="white" opacity="0.9"/>
  <!-- Trend dot -->
