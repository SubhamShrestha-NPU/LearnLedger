  <!-- Wordmark -->
  <text x="48" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#1a1a1a">Learn<tspan fill="#0F6E56">Ledger</tspan></text>
</svg>
